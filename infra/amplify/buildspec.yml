version: 1
appRoot: apps/web
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
    postBuild:
      commands:
        - |
          cat > build/config.json <<JSON
          {
            "apiBaseUrl": "${API_BASE_URL:-https://w0j9m7dgpg.execute-api.us-west-1.amazonaws.com}",
            "detectionsApiBaseUrl": "${DETECTIONS_API_BASE_URL:-${API_BASE_URL:-https://w0j9m7dgpg.execute-api.us-west-1.amazonaws.com}}",
            "detectionRoutes": {
              "recent": "/detections/recent",
              "byObject": "/detections/object/{object_id}",
              "byGeohash": "/detections/geohash/{geohash}"
            },
            "stateBaseUrl": "${STATE_BASE_URL:-${API_BASE_URL:-https://w0j9m7dgpg.execute-api.us-west-1.amazonaws.com}}",
            "statePath": "${STATE_PATH:-/state}",
            "mapDataPath": "${MAP_DATA_PATH:-/map-data}",
            "driveConfigPath": "${DRIVE_CONFIG_PATH:-/drive-config}",
            "demoVideosPath": "${DEMO_VIDEOS_PATH:-/demo-videos}",
            "videoCameraIds": ["ch1", "ch2", "ch3", "ch4"],
            "perceptionStreamUrls": ${PERCEPTION_STREAM_URLS:-{}},
            "perceptionStreamBaseUrl": "${PERCEPTION_STREAM_BASE_URL:-}",
            "perceptionStreamPathTemplate": "${PERCEPTION_STREAM_PATH_TEMPLATE:-/streams/{camera_id}.mjpg}",
            "cloudflareDriveWsUrl": "${VITE_CLOUDFLARE_DRIVE_WS_URL:-}",
            "tailscaleDriveWsUrl": "${VITE_TAILSCALE_DRIVE_WS_URL:-wss://path-b860i-aorus-pro-ice.tail1cad6a.ts.net}"
          }
          JSON
  artifacts:
    baseDirectory: build
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
