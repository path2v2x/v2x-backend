name: Sync Amplify mirror

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: amplify-mirror-sync
  cancel-in-progress: false

jobs:
  sync:
    if: github.repository == 'michaelvu1207/v2x-backend-amplify'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fast-forward to canonical main
        shell: bash
        run: |
          set -euo pipefail
          canonical_ref=refs/remotes/canonical/main
          git fetch --no-tags \
            https://github.com/path2v2x/v2x-backend.git \
            "+refs/heads/main:${canonical_ref}"

          mirror_sha="$(git rev-parse HEAD)"
          canonical_sha="$(git rev-parse "${canonical_ref}")"
          if [[ "${mirror_sha}" == "${canonical_sha}" ]]; then
            echo "Mirror already matches canonical main at ${canonical_sha}."
            exit 0
          fi

          if ! git merge-base --is-ancestor "${mirror_sha}" "${canonical_sha}"; then
            echo "Mirror has diverged from canonical main; refusing to rewrite history." >&2
            exit 1
          fi

          git push origin "${canonical_sha}:refs/heads/main"
